# Configuration Pre-commit pour QARM-RL
# Installation: pip install pre-commit && pre-commit install
# Exécution manuelle: pre-commit run --all-files

repos:
  # Hooks généraux pour nettoyer les fichiers
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace        # Supprime les espaces en fin de ligne
      - id: end-of-file-fixer          # Assure une ligne vide en fin de fichier
      - id: check-merge-conflict       # Détecte les marqueurs de conflits de merge
      - id: debug-statements           # Détecte les instructions de debug (pdb, etc.)
      - id: mixed-line-ending          # Uniformise les fins de ligne
        args: ['--fix=lf']

  # Formatage du code Python avec Black
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=100']

  # Tri des imports avec isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '100']

  # Linting avec Flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [
          '--max-line-length=100',
          '--extend-ignore=E203,E501,W503',  # Compatible avec Black
          '--exclude=.git,__pycache__,venv,.venv'
        ]

  # Vérification des types avec mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [pydantic-settings>=2.0.0]
        args: [
          '--ignore-missing-imports',
          '--no-strict-optional',
        ]
